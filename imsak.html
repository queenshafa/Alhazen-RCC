<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadhan Daily Tracker</title>
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="/src/output.css" />
    <!-- Flowbite -->
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-cubic min-h-screen flex flex-col items-center justify-center font-sans text-emerald-900"
  >
    <nav
      class="backdrop-blur-md bg-white/70 border-b border-emerald-100 shadow-sm w-full z-20 top-0 start-0 border-default"
    >
      <div
        class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
      >
        <a
          href="index.html"
          class="flex items-center space-x-3 rtl:space-x-reverse"
        >
          <div
            class="bg-emerald-600 p-2 rounded-xl shadow-lg shadow-emerald-200"
          >
            <p>🌙</p>
          </div>
          <span
            class="self-center text-xl text-heading font-semibold whitespace-nowrap"
            >Ramadhan Portal</span
          >
        </a>
        <button
          data-collapse-toggle="navbar-default"
          type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
          aria-controls="navbar-default"
          aria-expanded="false"
        >
          <span class="sr-only">Open main menu</span>
          <svg
            class="w-6 h-6"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-width="2"
              d="M5 7h14M5 12h14M5 17h14"
            />
          </svg>
        </button>
        <div class="hidden w-full md:block md:w-auto" id="navbar-default">
          <ul
            class="font-medium flex flex-col p-4 md:p-0 mt-4 rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary"
          >
            <li>
              <a
                href="index.html"
                class="block py-2 px-3 bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
                >Home</a
              >
            </li>
            <li>
              <a
                href="imsak.html"
                aria-current="page"
                class="block py-2 px-3 text-emerald-600 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
                >Jadwal Imsakiyah</a
              >
            </li>
            <li>
              <a
                href="doa.html"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
                >Doa Sahur & Buka</a
              >
            </li>
            <li>
              <a
                href="kalkulator-zakat.html"
                aria-current="page"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
                >Kalkulator Zakat</a
              >
            </li>
            <li>
              <a
                href="tracker.html"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
                >Tracker Harian</a
              >
            </li>
            <li>
              <a
                href="tasbih.html"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
                >Tasbih Digital</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <header class="w-full mt-24 px-4 md:px-6 max-w-6xl">
      <div
        class="bg-white rounded-3xl w-full shadow-xl border-t-4 border-amber-400 px-8 py-6 text-center relative overflow-hidden"
      >
        <h1 class="text-center font-bold text-emerald-600 text-2xl">
          Jadwal Imsakiyah
        </h1>
        <div class="mb-2 mt-5 max-w-xs mx-auto">
          <label
            for="target-select"
            class="block text-xs font-semibold uppercase tracking-wider text-emerald-600 mb-2"
            >Pilih Kotamu!</label
          >
          <select
            id="target-select"
            class="bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full p-2.5 outline-none transition-all cursor-pointer font-bold"
          >
            <option value="Jakarta" selected>Jakarta</option>
            <option value="Bekasi">Bekasi</option>
            <option value="Bogor">Bogor</option>
          </select>
        </div>
      </div>
    </header>

    <main class="w-full px-4 md:px-6 mb-12 mt-8 max-w-6xl">
      <section
        class="w-full bg-white rounded-3xl shadow-xl border-t-4 border-amber-400 text-center relative overflow-hidden"
      >
        <div class="flex flex-col">
          <div class="overflow-x-auto">
            <table class="w-full text-sm md:text-base text-left">
              <thead class="text-white uppercase bg-emerald-700">
                <tr>
                  <th class="px-4 py-5 text-center">Tgl</th>
                  <th class="px-2 py-5 text-center">Imsak</th>
                  <th class="px-2 py-5 text-center">Subuh</th>
                  <th class="px-2 py-5 text-center">Dzuhur</th>
                  <th class="px-2 py-5 text-center">Ashar</th>
                  <th class="px-2 py-5 text-center">Maghrib</th>
                  <th class="px-2 py-5 text-center">Isya</th>
                </tr>
              </thead>
              <tbody
                id="schedule-body"
                class="divide-y divide-emerald-50"
              ></tbody>
            </table>
          </div>

          <div id="loading-state" class="hidden p-12 text-center">
            <div
              class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent"
            ></div>
            <p class="mt-3 text-emerald-600 font-semibold">
              Menyelaraskan waktu...
            </p>
          </div>
          <div id="error-state" class="hidden p-12 text-center text-red-500">
            <p class="font-bold">
              Waduh, koneksi terputus. Coba cek internetmu ya!
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer
      class="py-8 text-emerald-400 text-[10px] tracking-[0.2em] uppercase"
    >
      © 2026 Web Ramadhan
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script>
      const citySelect = document.getElementById("target-select");
      const scheduleBody = document.getElementById("schedule-body");
      const loadingState = document.getElementById("loading-state");
      const errorState = document.getElementById("error-state");

      const cityIdMap = {
        Jakarta: "1301",
        Bekasi: "1204",
        Bogor: "1205",
      };

      async function fetchJadwal() {
        const cityName = citySelect.value;
        const cityId = cityIdMap[cityName] || "1301"; // Fallback Jakarta

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const todayISO = now.toISOString().split("T")[0];

        // UI Reset
        scheduleBody.innerHTML = "";
        loadingState.classList.remove("hidden");
        errorState.classList.add("hidden");

        try {
          const response = await fetch(
            `https://api.myquran.com/v2/sholat/jadwal/${cityId}/${year}/${month}`,
          );
          const result = await response.json();

          if (result.status) {
            renderTable(result.data.jadwal, todayISO);
          } else {
            throw new Error("Data tidak ditemukan");
          }
        } catch (err) {
          errorState.classList.remove("hidden");
          console.error("Fetch Error:", err);
        } finally {
          loadingState.classList.add("hidden");
        }
      }

      function renderTable(jadwal, todayISO) {
        let rows = "";
        jadwal.forEach((day) => {
          const isToday = day.date === todayISO;
          const dateNum = day.tanggal.split(", ")[1].split("/")[0];

          rows += `
        <tr class="border-b border-emerald-50 transition-all ${
          isToday
            ? "bg-emerald-100 font-black text-emerald-950 border-l-4 border-l-emerald-500"
            : "hover:bg-emerald-50/50"
        }">
          <td class="px-3 py-4 text-center font-bold text-emerald-700">${dateNum}</td>
          <td class="px-2 py-4 text-center">${day.imsak}</td>
          <td class="px-2 py-4 text-center">${day.subuh}</td>
          <td class="px-2 py-4 text-center">${day.dzuhur}</td>
          <td class="px-2 py-4 text-center">${day.ashar}</td>
          <td class="px-2 py-4 text-center text-orange-600 font-bold">${day.maghrib}</td>
          <td class="px-2 py-4 text-center">${day.isya}</td>
        </tr>
      `;
        });
        scheduleBody.innerHTML = rows;
      }

      citySelect.addEventListener("change", fetchJadwal);

      fetchJadwal();
    </script>
  </body>
</html>
